{% extends 'base.html' %}

{% block content %}

<h1>Update Transaction</h1>

<h3>{{ portfolio.name }}</h3>

<p>
    Asset:
    {{ transaction.asset.name }}
    ({{ transaction.asset.symbol }})
</p>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Update Transaction
    </button>
</form>

{% endblock content %}
